# Stack de observabilidad CircleGuard (Día 4): métricas + alertas + tracing.
# Ligero a propósito (8GB RAM). Levantar con:
#   docker compose -f observability/docker-compose.observability.yml up -d
# UIs: Prometheus :9090 | Alertmanager :9093 | Grafana :3000 (admin/admin) | Jaeger :16686
name: circleguard-observability

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: circleguard-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: circleguard-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 128m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: circleguard-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    mem_limit: 256m
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: circleguard-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP (receptor de trazas de los servicios)
    mem_limit: 384m
    restart: unless-stopped
