# NOTE: In production these would be managed by a secrets manager (Vault, AWS SSM, etc.)
# These values are Base64-encoded. Decode: echo -n "value" | base64
# admin → YWRtaW4=   password → cGFzc3dvcmQ=   neo4j/password → see below
apiVersion: v1
kind: Secret
metadata:
  name: circleguard-db-secret
type: Opaque
data:
  postgres-user:     YWRtaW4=         # admin
  postgres-password: cGFzc3dvcmQ=     # password
  neo4j-password:    cGFzc3dvcmQ=     # password
---
apiVersion: v1
kind: Secret
metadata:
  name: circleguard-app-secret
type: Opaque
data:
  # echo -n "circleguard-jwt-secret-minimum-256-bits-this-is-for-taller-2-only" | base64
  jwt-secret: Y2lyY2xlZ3VhcmQtand0LXNlY3JldC1taW5pbXVtLTI1Ni1iaXRzLXRoaXMtaXMtZm9yLXRhbGxlci0yLW9ubHk=
  vault-hash-salt: Y2lyY2xlZ3VhcmQtc2FsdA==   # circleguard-salt
