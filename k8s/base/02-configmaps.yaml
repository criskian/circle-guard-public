apiVersion: v1
kind: ConfigMap
metadata:
  name: circleguard-config
data:
  # Service URLs (internal DNS in K8s)
  AUTH_SERVICE_URL:       "http://auth-service:8180"
  IDENTITY_SERVICE_URL:   "http://identity-service:8083"
  FORM_SERVICE_URL:       "http://form-service:8086"
  PROMOTION_SERVICE_URL:  "http://promotion-service:8088"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8082"
  DASHBOARD_SERVICE_URL:  "http://dashboard-service:8084"

  # Infrastructure
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  REDIS_HOST:              "redis"
  REDIS_PORT:              "6379"
  NEO4J_URI:               "bolt://neo4j:7687"
  POSTGRES_HOST:           "postgres"
  POSTGRES_PORT:           "5432"
  LDAP_URL:                "ldap://openldap:389"
  MAIL_HOST:               "mailhog"
  MAIL_PORT:               "1025"

  # Spring profiles
  SPRING_PROFILES_ACTIVE: "k8s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init-db.sql: |
    CREATE DATABASE IF NOT EXISTS circleguard_auth;
    CREATE DATABASE IF NOT EXISTS circleguard_identity;
    CREATE DATABASE IF NOT EXISTS circleguard_form;
    CREATE DATABASE IF NOT EXISTS circleguard_promotion;
    CREATE DATABASE IF NOT EXISTS circleguard_dashboard;
