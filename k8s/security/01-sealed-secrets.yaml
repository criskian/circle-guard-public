# Sealed Secrets — migración de k8s/base/01-secrets.yaml a formato cifrado
#
# IMPORTANTE: Los valores encryptedData son PLACEHOLDERS.
# Para generar los valores reales ejecutar:
#
#   # 1. Instalar controlador
#   kubectl apply -f k8s/security/sealed-secrets-controller.yaml
#
#   # 2. Obtener clave pública del controlador
#   kubeseal --fetch-cert \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     > /tmp/pub-cert.pem
#
#   # 3. Sellar los secrets originales
#   kubeseal --cert /tmp/pub-cert.pem \
#     --format yaml \
#     < k8s/base/01-secrets.yaml \
#     > k8s/security/01-sealed-secrets.yaml
#
#   # 4. Eliminar el plaintext secret del cluster (si existe)
#   kubectl delete secret circleguard-db-secret circleguard-app-secret -n circleguard-dev || true
#
#   # 5. Aplicar el sealed secret (el controlador lo desencripta automáticamente)
#   kubectl apply -f k8s/security/01-sealed-secrets.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: circleguard-db-secret
  namespace: circleguard-dev
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # Estos valores deben ser generados con kubeseal --cert <pub-cert.pem>
    # Valores placeholder — reemplazar con output real de kubeseal
    postgres-user:     AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq... # PLACEHOLDER
    postgres-password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq... # PLACEHOLDER
    neo4j-password:    AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq... # PLACEHOLDER
  template:
    metadata:
      name: circleguard-db-secret
      namespace: circleguard-dev
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: circleguard-app-secret
  namespace: circleguard-dev
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # Estos valores deben ser generados con kubeseal --cert <pub-cert.pem>
    # Valores placeholder — reemplazar con output real de kubeseal
    jwt-secret:      AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq... # PLACEHOLDER
    vault-hash-salt: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq... # PLACEHOLDER
  template:
    metadata:
      name: circleguard-app-secret
      namespace: circleguard-dev
    type: Opaque
