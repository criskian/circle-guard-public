# Sealed Secrets — migración de k8s/base/01-secrets.yaml a formato cifrado.
#
# Valores encryptedData REALES, generados con kubeseal contra la clave pública
# del controlador (bitnami/sealed-secrets-controller:0.26.3) en este cluster.
#
# Regenerar (si se rota la clave del controlador):
#   kubeseal --fetch-cert --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system > /tmp/pub-cert.pem
#   kubeseal --cert /tmp/pub-cert.pem --format yaml < k8s/base/01-secrets.yaml \
#     > k8s/security/01-sealed-secrets.yaml   # (con namespace: circleguard-dev)
#   kubectl apply -f k8s/security/01-sealed-secrets.yaml
#
# El controlador desencripta automáticamente el SealedSecret en un Secret Opaque.

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: circleguard-db-secret
  namespace: circleguard-dev
spec:
  encryptedData:
    neo4j-password: 
    postgres-password: 
    postgres-user: 
  template:
    metadata:
      creationTimestamp: null
      name: circleguard-db-secret
      namespace: circleguard-dev
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: circleguard-app-secret
  namespace: circleguard-dev
spec:
  encryptedData:
    jwt-secret: 
    vault-hash-salt: 
  template:
    metadata:
      creationTimestamp: null
      name: circleguard-app-secret
      namespace: circleguard-dev
    type: Opaque
