version: '3.8'

# SonarQube + PostgreSQL para análisis estático de código CircleGuard
# Uso: docker compose -f ci/sonarqube/docker-compose.yml up -d
# UI: http://localhost:9000  (admin / admin en primer inicio)

services:
  sonarqube:
    image: sonarqube:10.6-community
    container_name: circleguard-sonarqube
    depends_on:
      sonar_db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - sonar_net

  sonar_db:
    image: postgres:15-alpine
    container_name: circleguard-sonar-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sonar_net

volumes:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_db:

networks:
  sonar_net:
    driver: bridge
