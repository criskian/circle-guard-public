jenkins:
  systemMessage: "CircleGuard CI/CD — Taller 2 Ingeniería de Software"
  numExecutors: 4
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin123"
          properties:
            - "apiToken"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  globalNodeProperties:
    - envVars:
        env:
          - key: CIRCLE_GUARD_ROOT
            value: /workspace/circle-guard-public
          - key: KUBECONFIG
            value: /var/jenkins_home/.kube/config

tool:
  gradle:
    installations:
      - name: "Gradle-Wrapper"
        home: ""
        properties:
          - installSource:
              installers:
                - gradleInstaller:
                    id: "8.7"

  nodejs:
    installations:
      - name: "Node-20"
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "20.14.0"

jobs:
  - script: >
      pipelineJob('circleguard-auth-service') {
        description('Auth Service CI/CD Pipeline')
        definition {
          cpsScm {
            scm {
              git {
                remote { url('file:///workspace/circle-guard-public') }
                branch('*/master')
              }
            }
            scriptPath('services/circleguard-auth-service/Jenkinsfile')
            lightweight(false)
          }
        }
      }
  - script: >
      pipelineJob('circleguard-identity-service') {
        description('Identity Service CI/CD Pipeline')
