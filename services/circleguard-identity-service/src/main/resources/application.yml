spring:
  application:
    name: circleguard-identity-service
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_identity
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vault:
  secret: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
  salt: "deadbeef"
  hash-salt: "12345678"

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"

server:
  port: 8083
# ── Observabilidad (Día 4): Prometheus + tracing OTLP → Jaeger ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
