spring:
  application:
    name: circleguard-notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

auth:
  api:
    url: ${AUTH_API_URL:http://localhost:8180}

notification:
  url:
    testing: https://circleguard.example.com/testing
    isolation: https://circleguard.example.com/isolation
    guidelines: "circleguard://guidelines"

lms:
  api:
    url: https://lms.university.edu/api/v1

identity:
  api:
    url: http://circleguard-identity-service:8081

room:
  booking:
    api:
      url: https://facilities.university.edu/api/v1/rooms

push:
  gotify:
    url: http://localhost:8080
    token: MOCK_TOKEN

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

server:
  port: 8082
# ── Observabilidad (Día 4): Prometheus + tracing OTLP → Jaeger ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
