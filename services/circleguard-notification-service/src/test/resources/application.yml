spring:
  datasource:
    url: jdbc:h2:mem:notiftestdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: notification-test-group
      auto-offset-reset: earliest
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: "my-super-secret-test-key-32-chars-long-12345"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-test-1234567890123456"

auth:
  api:
    url: http://localhost:18180

server:
  port: 0
