spring:
  application:
    name: circleguard-gateway-service
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      redis-status:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

circleguard:
  features:
    strict-qr-validation: true
    email-notifications-enabled: true
    qr-expiration-enabled: true
